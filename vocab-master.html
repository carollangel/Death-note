<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocabMaster</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --accent3: #ff6b6b;
    --text: #f0f0f5;
    --muted: #666680;
    --success: #4fffb0;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 20px 80px;
    position: relative;
    z-index: 1;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 40px;
  }

  .logo {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .logo span { color: var(--accent); }

  .tagline {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* Tab nav */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
    background: var(--surface);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 7px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .tab.active {
    background: var(--accent);
    color: #0a0a0f;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  /* Input panel */
  .input-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .vocab-row {
    display: grid;
    grid-template-columns: 1fr 1.5fr auto;
    gap: 8px;
    align-items: center;
  }

  .vocab-row input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .vocab-row input:focus { border-color: var(--accent); }
  .vocab-row input::placeholder { color: var(--muted); }

  .row-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    width: 18px;
    text-align: right;
    flex-shrink: 0;
  }

  .vocab-row-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .speak-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--accent2);
    font-size: 16px;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .speak-btn:hover { background: var(--accent2); color: #0a0a0f; border-color: var(--accent2); }

  .add-row-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 10px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
  }

  .add-row-btn:hover { border-color: var(--accent); color: var(--accent); }

  .btn-readall {
    background: var(--surface);
    border: 1px solid var(--accent2);
    border-radius: 8px;
    padding: 13px 28px;
    color: var(--accent2);
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-readall:hover { background: var(--accent2); color: #0a0a0f; }
  .btn-readall.reading { background: rgba(71,200,255,0.1); animation: borderPulse 1s ease infinite; }

  @keyframes borderPulse {
    0%, 100% { border-color: var(--accent2); }
    50% { border-color: transparent; }
  }

  .reading-row {
    background: rgba(71,200,255,0.06) !important;
    border-radius: 8px;
    transition: background 0.3s;
  }

  .btn-primary {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 13px 28px;
    color: #0a0a0f;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    margin-top: 8px;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,255,71,0.2); }
  .btn-primary:active { transform: translateY(0); }

  /* Flashcard */
  .card-counter {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  .card-scene {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 220px;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    gap: 12px;
  }

  .card-front {
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .card-back {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 1px solid var(--accent2);
    transform: rotateY(180deg);
  }

  .card-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .card-word {
    font-size: 36px;
    font-weight: 800;
    color: var(--accent);
    text-align: center;
    letter-spacing: -1px;
  }

  .card-hint {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }

  .card-meaning {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent2);
    text-align: center;
  }

  .card-example {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
    font-style: italic;
  }

  .card-controls {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: center;
  }

  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px;
    color: var(--text);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  .speak-card-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--accent2);
    font-size: 18px;
    transition: all 0.15s;
  }

  .speak-card-btn:hover { background: var(--accent2); color: #0a0a0f; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-family: var(--font-mono); font-size: 13px; line-height: 1.6; }

  /* Quiz panel */
  .quiz-progress {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 16px;
    text-align: center;
  }

  .quiz-type-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 20px;
  }

  .quiz-question {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .quiz-sub {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .option-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 12px;
    color: var(--text);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    line-height: 1.3;
  }

  .option-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .option-btn.correct { background: rgba(79,255,176,0.1); border-color: var(--success); color: var(--success); }
  .option-btn.wrong { background: rgba(255,107,107,0.1); border-color: var(--accent3); color: var(--accent3); }
  .option-btn:disabled { cursor: default; }

  .fill-input-wrap {
    display: flex;
    gap: 10px;
  }

  .fill-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 16px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .fill-input:focus { border-color: var(--accent); }

  .check-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 13px 20px;
    color: #0a0a0f;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
  }

  .check-btn:hover { opacity: 0.85; }

  .feedback {
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 12px 16px;
    border-radius: 8px;
    margin-top: 12px;
    display: none;
    line-height: 1.5;
  }

  .feedback.show { display: block; }
  .feedback.ok { background: rgba(79,255,176,0.08); color: var(--success); border: 1px solid rgba(79,255,176,0.2); }
  .feedback.nope { background: rgba(255,107,107,0.08); color: var(--accent3); border: 1px solid rgba(255,107,107,0.2); }

  .next-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    color: var(--text);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: all 0.15s;
    margin-top: 10px;
    display: none;
  }

  .next-btn.show { display: block; }
  .next-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Score panel */
  .score-panel {
    text-align: center;
    padding: 48px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
  }

  .score-big {
    font-size: 72px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
  }

  .score-label {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .score-breakdown {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 28px;
  }

  .score-stat { text-align: center; }
  .score-stat-num { font-size: 24px; font-weight: 800; }
  .score-stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .correct-num { color: var(--success); }
  .wrong-num { color: var(--accent3); }

  /* Animations */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel.active { animation: slideIn 0.3s ease; }

  .speaking-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    animation: pulse 0.6s ease infinite alternate;
  }

  @keyframes pulse { to { transform: scale(1.5); opacity: 0.4; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <div class="logo">Vocab<span>_</span>Master</div>
      <div class="tagline">Input → Listen → Flip → Quiz</div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('input')">① Input</button>
    <button class="tab" onclick="switchTab('cards')">② Flashcard</button>
    <button class="tab" onclick="switchTab('quiz')">③ Quiz</button>
  </div>

  <!-- INPUT PANEL -->
  <div id="panel-input" class="panel active">
    <div class="input-grid" id="vocabRows">
      <!-- rows injected by JS -->
    </div>
    <button class="add-row-btn" onclick="addRow()">+ Add word</button>
    <button class="btn-readall" id="readAllBtn" onclick="toggleReadAll()">
      <span id="readAllIcon">▶</span>
      <span id="readAllLabel">Read All Vocab</span>
    </button>
    <button class="btn-primary" onclick="saveAndStudy()">Save & Start Studying →</button>
  </div>

  <!-- FLASHCARD PANEL -->
  <div id="panel-cards" class="panel">
    <div id="cards-content"></div>
  </div>

  <!-- QUIZ PANEL -->
  <div id="panel-quiz" class="panel">
    <div id="quiz-content"></div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────
let vocab = []; // [{word, meaning, example?}]
let cardIndex = 0;
let cardFlipped = false;
let quizItems = [];
let quizIndex = 0;
let quizScore = 0;
let quizAnswered = false;

// ─── Init ─────────────────────────────────────────────────────────────
function init() {
  const saved = localStorage.getItem('vocabmaster_data');
  if (saved) vocab = JSON.parse(saved);
  renderInputRows();
}

function renderInputRows() {
  const container = document.getElementById('vocabRows');
  container.innerHTML = '';
  const rows = vocab.length > 0 ? vocab : Array(5).fill({word:'',meaning:''});
  rows.forEach((v, i) => addRowHTML(i, v.word || '', v.meaning || ''));
  if (vocab.length === 0) {
    // ensure 5 empty rows
    container.innerHTML = '';
    for (let i = 0; i < 5; i++) addRowHTML(i, '', '');
  }
}

function addRowHTML(i, word, meaning) {
  const container = document.getElementById('vocabRows');
  const div = document.createElement('div');
  div.className = 'vocab-row-wrap';
  div.innerHTML = `
    <span class="row-num">${String(i+1).padStart(2,'0')}</span>
    <div class="vocab-row" style="flex:1">
      <input type="text" placeholder="word / idiom" value="${esc(word)}" id="word-${i}" />
      <input type="text" placeholder="meaning / definition" value="${esc(meaning)}" id="meaning-${i}" />
      <button class="speak-btn" onclick="speakText(document.getElementById('word-${i}').value)" title="Listen">🔊</button>
    </div>`;
  container.appendChild(div);
}

function addRow() {
  const container = document.getElementById('vocabRows');
  const i = container.children.length;
  addRowHTML(i, '', '');
}

function esc(s) { return (s||'').replace(/"/g, '&quot;'); }

// ─── TTS ──────────────────────────────────────────────────────────────
let isReading = false;

function speakText(text, rate = 0.85) {
  if (!text.trim()) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = rate;
  window.speechSynthesis.speak(utt);
}

function speakPromise(text, rate = 0.85) {
  return new Promise((resolve) => {
    if (!text.trim()) { resolve(); return; }
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'en-US';
    utt.rate = rate;
    utt.onend = resolve;
    utt.onerror = resolve;
    window.speechSynthesis.speak(utt);
  });
}

const ordinals = ['','one','two','three','four','five','six','seven','eight','nine','ten',
  'eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen','twenty'];

function numToWord(n) { return ordinals[n] || String(n); }

function toggleReadAll() {
  if (isReading) {
    stopReadAll(); return;
  }
  // collect current rows from input fields
  const rows = document.getElementById('vocabRows').children;
  const list = [];
  for (let el of rows) {
    const inputs = el.querySelectorAll('input');
    const word = inputs[0]?.value.trim();
    const meaning = inputs[1]?.value.trim();
    if (word && meaning) list.push({ word, meaning, el });
  }
  if (list.length === 0) { alert('Add at least 1 word first!'); return; }
  startReadAll(list);
}

async function startReadAll(list) {
  isReading = true;
  const btn = document.getElementById('readAllBtn');
  const icon = document.getElementById('readAllIcon');
  const label = document.getElementById('readAllLabel');
  btn.classList.add('reading');
  icon.textContent = '■';
  label.textContent = 'Stop';

  window.speechSynthesis.cancel();

  for (let i = 0; i < list.length; i++) {
    if (!isReading) break;

    const { word, meaning, el } = list[i];

    // highlight current row
    document.querySelectorAll('.vocab-row-wrap').forEach(r => r.classList.remove('reading-row'));
    el.classList.add('reading-row');

    // update label
    label.textContent = `Reading ${i+1}/${list.length}...`;

    // speak: "Number one"
    await speakPromise(`Number ${numToWord(i + 1)}.`, 0.9);
    if (!isReading) break;

    // speak the word (slightly slower for clarity)
    await speakPromise(word, 0.75);
    if (!isReading) break;

    // pause 0.4s
    await new Promise(r => setTimeout(r, 400));
    if (!isReading) break;

    // speak "meaning:"
    await speakPromise('meaning', 0.9);
    if (!isReading) break;

    // speak the meaning
    await speakPromise(meaning, 0.85);
    if (!isReading) break;

    // gap between entries
    await new Promise(r => setTimeout(r, 600));
  }

  stopReadAll();
}

function stopReadAll() {
  isReading = false;
  window.speechSynthesis.cancel();
  document.querySelectorAll('.vocab-row-wrap').forEach(r => r.classList.remove('reading-row'));
  const btn = document.getElementById('readAllBtn');
  const icon = document.getElementById('readAllIcon');
  const label = document.getElementById('readAllLabel');
  if (btn) {
    btn.classList.remove('reading');
    icon.textContent = '▶';
    label.textContent = 'Read All Vocab';
  }
}

// ─── Save ─────────────────────────────────────────────────────────────
function saveAndStudy() {
  const rows = document.getElementById('vocabRows').children;
  vocab = [];
  for (let el of rows) {
    const inputs = el.querySelectorAll('input');
    const word = inputs[0]?.value.trim();
    const meaning = inputs[1]?.value.trim();
    if (word && meaning) vocab.push({ word, meaning });
  }
  if (vocab.length === 0) { alert('Add at least 1 word!'); return; }
  localStorage.setItem('vocabmaster_data', JSON.stringify(vocab));
  cardIndex = 0;
  cardFlipped = false;
  switchTab('cards');
  renderCards();
  buildQuiz();
}

// ─── FLASHCARD ────────────────────────────────────────────────────────
function renderCards() {
  const c = document.getElementById('cards-content');
  if (vocab.length === 0) {
    c.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No vocab yet.<br>Go to ① Input tab first.</p></div>`;
    return;
  }
  const v = vocab[cardIndex];
  c.innerHTML = `
    <div class="card-counter">${cardIndex + 1} / ${vocab.length}</div>
    <div class="card-scene" onclick="flipCard()">
      <div class="card-inner" id="cardInner">
        <div class="card-face card-front">
          <span class="card-label">word</span>
          <div class="card-word">${v.word}</div>
          <span class="card-hint">tap to reveal →</span>
        </div>
        <div class="card-face card-back">
          <span class="card-label">meaning</span>
          <div class="card-meaning">${v.meaning}</div>
        </div>
      </div>
    </div>
    <div class="card-controls">
      <button class="nav-btn" onclick="prevCard()">← Prev</button>
      <button class="speak-card-btn" onclick="speakText('${v.word.replace(/'/g,"\\'")}')">🔊</button>
      <button class="nav-btn" style="text-align:right" onclick="nextCard()">Next →</button>
    </div>`;
  cardFlipped = false;
}

function flipCard() {
  cardFlipped = !cardFlipped;
  const ci = document.getElementById('cardInner');
  if (ci) ci.classList.toggle('flipped', cardFlipped);
  if (cardFlipped) {
    // auto-speak the word when flipped to back
    speakText(vocab[cardIndex].word, 0.8);
  }
}

function nextCard() {
  cardIndex = (cardIndex + 1) % vocab.length;
  renderCards();
}
function prevCard() {
  cardIndex = (cardIndex - 1 + vocab.length) % vocab.length;
  renderCards();
}

// ─── QUIZ ──────────────────────────────────────────────────────────────
function buildQuiz() {
  quizItems = [];
  vocab.forEach((v, i) => {
    // Q1: MCQ - word → meaning
    const distractors = vocab.filter((_,j) => j !== i).map(x => x.meaning);
    shuffle(distractors);
    quizItems.push({
      type: 'mcq',
      question: v.word,
      sub: 'Choose the correct meaning:',
      answer: v.meaning,
      options: shuffle([v.meaning, ...distractors.slice(0,3)])
    });
    // Q2: Fill in - meaning → word
    quizItems.push({
      type: 'fill',
      question: v.meaning,
      sub: 'Type the word:',
      answer: v.word
    });
  });
  shuffle(quizItems);
  quizIndex = 0;
  quizScore = 0;
  quizAnswered = false;
  renderQuiz();
}

function renderQuiz() {
  const c = document.getElementById('quiz-content');
  if (quizItems.length === 0) {
    c.innerHTML = `<div class="empty-state"><div class="icon">🎯</div><p>Save vocab first from ① Input.</p></div>`;
    return;
  }
  if (quizIndex >= quizItems.length) {
    showScore(c); return;
  }

  const q = quizItems[quizIndex];
  const pct = (quizIndex / quizItems.length * 100).toFixed(0);

  let bodyHTML = '';
  if (q.type === 'mcq') {
    bodyHTML = `<div class="options-grid" id="optionsGrid">
      ${q.options.map((o,i) => `<button class="option-btn" id="opt-${i}" onclick="checkMCQ(${i}, '${o.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">${o}</button>`).join('')}
    </div>`;
  } else {
    bodyHTML = `<div class="fill-input-wrap">
      <input class="fill-input" id="fillInput" placeholder="type here..." onkeydown="if(event.key==='Enter')checkFill()" autofocus />
      <button class="check-btn" onclick="checkFill()">Check</button>
    </div>`;
  }

  c.innerHTML = `
    <div class="quiz-progress">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${quizIndex}/${quizItems.length}</span>
    </div>
    <div class="quiz-card">
      <span class="quiz-type-badge">${q.type === 'mcq' ? 'Multiple Choice' : 'Fill in the Blank'}</span>
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-sub">${q.sub}</div>
      ${bodyHTML}
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuiz()">Next question →</button>`;

  quizAnswered = false;
}

function checkMCQ(idx, chosen) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizItems[quizIndex];
  const correct = chosen === q.answer;
  if (correct) quizScore++;

  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (btn.id === `opt-${idx}`) btn.classList.add(correct ? 'correct' : 'wrong');
    // highlight correct answer
    if (!correct && btn.textContent === q.answer) btn.classList.add('correct');
  });

  showFeedback(correct, q.answer);
  speakText(q.question, 0.8);
}

function checkFill() {
  if (quizAnswered) return;
  const input = document.getElementById('fillInput');
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  quizAnswered = true;
  const q = quizItems[quizIndex];
  const correct = val.toLowerCase() === q.answer.toLowerCase();
  if (correct) quizScore++;
  input.disabled = true;
  input.style.borderColor = correct ? 'var(--success)' : 'var(--accent3)';
  showFeedback(correct, q.answer);
  speakText(q.answer, 0.8);
}

function showFeedback(correct, answer) {
  const fb = document.getElementById('feedback');
  fb.className = `feedback show ${correct ? 'ok' : 'nope'}`;
  fb.textContent = correct
    ? `✓ Correct!  "${answer}"`
    : `✗ The answer is: "${answer}"`;
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuiz() {
  quizIndex++;
  renderQuiz();
}

function showScore(c) {
  const total = quizItems.length;
  const wrong = total - quizScore;
  const pct = Math.round(quizScore / total * 100);
  c.innerHTML = `
    <div class="score-panel">
      <div class="score-big">${pct}%</div>
      <div class="score-label">Quiz complete — ${vocab.length} words</div>
      <div class="score-breakdown">
        <div class="score-stat"><div class="score-stat-num correct-num">${quizScore}</div><div class="score-stat-label">Correct</div></div>
        <div class="score-stat"><div class="score-stat-num wrong-num">${wrong}</div><div class="score-stat-label">Wrong</div></div>
        <div class="score-stat"><div class="score-stat-num">${total}</div><div class="score-stat-label">Total</div></div>
      </div>
      <button class="btn-primary" onclick="buildQuiz()">Retry Quiz</button>
    </div>`;
}

// ─── Tab switching ────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['input','cards','quiz'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');

  if (name === 'cards') { renderCards(); }
  if (name === 'quiz' && quizItems.length > 0) { renderQuiz(); }
  else if (name === 'quiz') { buildQuiz(); }
  if (name === 'input') { renderInputRows(); }
}

// ─── Utils ────────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

init();
</script>
